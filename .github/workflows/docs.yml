name: Docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Sphinx docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build docs with warnings as errors
        run: ./scripts/check-docs.sh
